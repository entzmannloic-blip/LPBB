const iso=()=>new Date().toISOString().slice(0,10);
const addD=(s,n)=>{const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
function dBet(a,b){return Math.floor((new Date(b)-new Date(a))/864e5);}

const isoOff=(n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};

/* ── Calculs ─────────────────────────────────────────────────── */
function calcPreco({lastPeriod,cycleLen,periodLen}){
  const N=cycleLen||28,P=periodLen||5,ovDay=N-14;
  const fS=Math.max(P+1,ovDay-5),pk=Math.max(fS,ovDay-1),fE=Math.min(N,ovDay+1);
  const today=new Date(),lp=new Date(lastPeriod||isoOff(-14));
  const elapsed=Math.max(0,Math.floor((today-lp)/864e5));
  const dayIn=elapsed%N+1;
  const nLP=addD(lastPeriod||isoOff(-14),Math.floor(elapsed/N+1)*N);
  const nOv=addD(nLP,-14);
  const dToOv=Math.round((new Date(nOv)-today)/864e5);
  const dToPer=Math.round((new Date(nLP)-today)/864e5);
  let ph;
  if(dayIn<=P)ph="menses";else if(dayIn<fS)ph="follicular";
  else if(dayIn>=pk&&dayIn<=fE)ph="peak";else if(dayIn>=fS&&dayIn<pk)ph="fertile";else ph="luteal";
  const dv=dayIn-ovDay;
  let fPct,fLabel,fColor;
  if(dayIn<=P){fPct=2;fLabel="Très faible";fColor=CPH.follicular.c;}
  else if(dayIn<fS){fPct=8;fLabel="Faible";fColor=CPH.follicular.c;}
  else if(dv<=-3){fPct=38;fLabel="Élevée";fColor=CPH.fertile.c;}
  else if(dv>=-2&&dv<=0){fPct=94;fLabel="Maximale ⭐";fColor=CPH.peak.c;}
  else if(dv===1){fPct=16;fLabel="Décroissante";fColor=CPH.luteal.c;}
  else{fPct=2;fLabel="Faible";fColor=CPH.luteal.c;}
  return{N,P,ovDay,fS,pk,fE,dayIn,dToOv,dToPer,ph,fPct,fLabel,fColor,nOv,nLP,inW:dayIn>=fS&&dayIn<=fE};
}
function phFor(day,c){if(day<=c.P)return"menses";if(day<c.fS)return"follicular";if(day>=c.pk&&day<=c.fE)return"peak";if(day>=c.fS&&day<c.pk)return"fertile";return"luteal";}
function calcGross({dpa}){
  const dt=dBet(new Date(),dpa);let sa=41-Math.round(dt/7);sa=Math.min(41,Math.max(4,sa));
  const tri=sa<=14?1:sa<=27?2:3,col=tri===1?"#7C9A86":tri===2?"#DC9B4E":"#CC7355";
  return{sa,tri,col,wLeft:Math.max(0,Math.round(dt/7)),pct:Math.min(100,Math.round(sa/41*100)),fruit:fruitFor(sa)};
}
function ageInfo(birth){
  const days=Math.max(0,dBet(birth,new Date())),m=Math.min(24,Math.floor(days/30.44));
  let label;if(days<14)label=`${days}j`;else if(m<1)label=`${Math.floor(days/7)} sem.`;
  else{const w=Math.floor((days-m*30.44)/7);const ws=w>0?" "+w+"sem.":"";label=`${m} mois${ws}`;}
  return{days,months:m,label};
}

function bbtSeed(c){const a=[];for(let d=1;d<=c.N;d++){let b=d<c.ovDay?36.45:36.80;const n=Math.sin(d*1.7)*0.04;let t=d===c.ovDay?36.40:b+n;a.push({j:d,t:+(t.toFixed(2))});}return a;}

/* ── Lectures ────────────────────────────────────────────────── */
function lPreco(c){
  if(c.ph==="menses")return[`Tu es à J${c.dayIn}, phase menstruelle. La fenêtre fertile s'ouvre vers J${c.fS}.`];
  if(c.ph==="follicular")return[`J${c.dayIn}, phase folliculaire. Ovulation estimée dans ${c.dToOv} j, fenêtre fertile à partir de J${c.fS}.`];
  if(c.ph==="peak")return[`J${c.dayIn} : pic d'ovulation estimé. Les 48 h à venir sont les plus fertiles.`];
  if(c.ph==="fertile")return[`J${c.dayIn} : fenêtre fertile, fertilité élevée. Ovulation prévue dans ${c.dToOv}j (le ${fmt(c.nOv)}).`];
  return[`J${c.dayIn}, phase lutéale. Prochaines règles dans ${c.dToPer} j (vers le ${fmt(c.nLP)}).`];
}
function lGross(g,dpa){
  const f=g.fruit,art="aeiouéâ".includes(f[0])?"une":"un";
  return[`${g.sa} SA — bébé a la taille d'${art} ${f}. T${g.tri}, ${g.pct}% du parcours.`,
    `Il reste ~${g.wLeft} semaine${g.wLeft!==1?"s":""} avant le terme (${fmt(dpa)}). Écoute ton corps, et surveille les mouvements de bébé.`];
}
function lPP(pp,comfort){
  if(comfort)return[`${pp.label} après l'accouchement. Chaque jour est une avancée. Prends soin de toi.`];
  return[`${pp.label} après l'accouchement. Fatigue, émotivité et bouleversements sont normaux.`,`Prendre du temps pour toi fait partie du soin. Si le mal-être dure plus de 2 semaines, parle-en.`];
}
function lBebe(age,sleepMin,feeds,nap,sleeping){
  const p=[];
  if(age.months<4)p.push(`${age.label} : les rythmes se mettent en place. Observe ses signes de fatigue — bâillements, regard dans le vide.`);
  else if(age.months<13)p.push(`${age.label} : il explore et babille. Le lait reste central, en complément des repas.`);
  else p.push(`${age.label} : il marche, découvre, s'affirme. Les routines le rassurent.`);
  const o=[];if(sleepMin>0){const h=Math.floor(sleepMin/60),m=sleepMin%60;const hStr=(h>0?h+"h":"")+" "+(m>0?m+"min":"");o.push(hStr.trim()+" de sommeil");}
  if(feeds>0)o.push(`${feeds} repas`);if(o.length)p.push(`Aujourd'hui : ${o.join(", ")}.`);
  p.push(sleeping?`Il dort — profite-en.`:`Prochaine sieste estimée vers ${nap}.`);
  return p;
}

/* ── SVG roue helpers ────────────────────────────────────────── */
const GW={cx:200,cy:200,rO:168,rM:116,rI:88,rL:144,gap:1.4};
const wPt=(r,deg)=>{const a=(deg-90)*Math.PI/180;return{x:GW.cx+r*Math.cos(a),y:GW.cy+r*Math.sin(a)};};
function wArc(r1,r2,a1,a2){const g=GW.gap/2,p1=wPt(r2,a1+g),p2=wPt(r2,a2-g),p3=wPt(r1,a2-g),p4=wPt(r1,a1+g),lg=(a2-a1)>180?1:0;const f=v=>v.toFixed(2);return `M${f(p1.x)},${f(p1.y)} A${r2},${r2},0,${lg},1,${f(p2.x)},${f(p2.y)} L${f(p3.x)},${f(p3.y)} A${r1},${r1},0,${lg},0,${f(p4.x)},${f(p4.y)}Z`;}

function useSpeak(lines){
  const [on,setOn]=useState(false);
  const speak=useCallback(()=>{try{const s=window.speechSynthesis;if(!s)return;if(on){s.cancel();setOn(false);return;}const u=new SpeechSynthesisUtterance(lines.join(" "));u.lang="fr-FR";u.onend=()=>setOn(false);s.cancel();s.speak(u);setOn(true);}catch(e){};},[lines,on]);
  useEffect(()=>()=>{try{window.speechSynthesis&&window.speechSynthesis.cancel();}catch(e){};},[]);
  return[on,speak];
}

function CycleWheel({cycleLen,periodLen,lastPeriod,onChange,onTap}){
  const svgRef=useRef(null);
  const live=useRef({cycleLen,onChange});live.current.cycleLen=cycleLen;live.current.onChange=onChange;
  useEffect(()=>{
    const svg=svgRef.current;if(!svg)return;let dr=false,sA=0,sL=cycleLen;
    const ang=e=>{const r=svg.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,{clientX,clientY}=e.touches?e.touches[0]:e;return Math.atan2(clientY-cy,clientX-cx)*180/Math.PI;};
    const oS=e=>{const r=svg.getBoundingClientRect(),sc=r.width/400,{clientX,clientY}=e.touches?e.touches[0]:e,dist=Math.hypot(clientX-(r.left+r.width/2),clientY-(r.top+r.height/2));if(dist<GW.rM*sc||dist>(GW.rO+28)*sc)return;e.preventDefault();dr=true;sA=ang(e);sL=live.current.cycleLen;};
    const oM=e=>{if(!dr)return;e.preventDefault();let d=ang(e)-sA;if(d>180)d-=360;if(d<-180)d+=360;const nl=Math.max(21,Math.min(40,sL+Math.round(d/(360/sL))));if(nl!==live.current.cycleLen)live.current.onChange(nl);};
    const oE=()=>{dr=false;};
    svg.addEventListener("touchstart",oS,{passive:false});svg.addEventListener("touchmove",oM,{passive:false});svg.addEventListener("touchend",oE);
    svg.addEventListener("mousedown",oS);window.addEventListener("mousemove",oM);window.addEventListener("mouseup",oE);
    return()=>{svg.removeEventListener("touchstart",oS);svg.removeEventListener("touchmove",oM);svg.removeEventListener("touchend",oE);svg.removeEventListener("mousedown",oS);window.removeEventListener("mousemove",oM);window.removeEventListener("mouseup",oE);};
  },[]);
  const c=useMemo(()=>calcPreco({lastPeriod,cycleLen,periodLen}),[lastPeriod,cycleLen,periodLen]);
  const step=360/cycleLen,fs=cycleLen<=28?10:9,Ph=CPH[c.ph];
  const segs=useMemo(()=>Array.from({length:cycleLen},(_,i)=>{const day=i+1,ph=phFor(day,c);return{day,a1:i*step,a2:(i+1)*step,ph,td:day===c.dayIn};}),[cycleLen,c,step]);
  const mPt=useMemo(()=>wPt(GW.rO+20,(c.dayIn-.5)*step),[c.dayIn,step]);
  const ovPt=useMemo(()=>wPt(GW.rO+14,(c.ovDay-.5)*step),[c.ovDay,step]);
  const f=v=>v.toFixed(2);
  const mPts=`${f(mPt.x)},${f(mPt.y)} ${f(wPt(GW.rO+11,(c.dayIn-.5)*step-.035).x)},${f(wPt(GW.rO+11,(c.dayIn-.5)*step-.035).y)} ${f(wPt(GW.rO+11,(c.dayIn-.5)*step+.035).x)},${f(wPt(GW.rO+11,(c.dayIn-.5)*step+.035).y)}`;
  return(<svg ref={svgRef} viewBox="0 0 400 400" style={{width:"100%",display:"block",touchAction:"none",userSelect:"none"}}>
    <defs><filter id="cws"><feDropShadow dx="0" dy="4" stdDeviation="10" floodColor="#1C2820" floodOpacity=".18"/></filter></defs>
    <circle cx={GW.cx} cy={GW.cy} r={GW.rO+6} fill="rgba(235,238,229,.55)"/>
    {segs.filter(s=>s.day>=c.fS&&s.day<=c.fE).map(s=><path key={`g${s.day}`} d={wArc(GW.rM-4,GW.rO+10,s.a1,s.a2)} fill={CPH[s.ph].c} fillOpacity=".18" style={{pointerEvents:"none"}}/>)}
    {segs.map(s=><path key={s.day} d={wArc(GW.rM,GW.rO,s.a1,s.a2)} fill={CPH[s.ph].c} fillOpacity={s.td?1:.78} stroke={s.td?"#fff":"none"} strokeWidth={s.td?2.5:0} style={{cursor:"pointer"}} onClick={()=>onTap(s.ph,s.day)}/>)}
    {segs.map(s=>{const pos=wPt(GW.rL,(s.day-.5)*step);return(<text key={`n${s.day}`} x={f(pos.x)} y={f(pos.y)} textAnchor="middle" dominantBaseline="middle" fill={s.td?"#fff":"rgba(255,255,255,.88)"} fontSize={s.td?fs+2:fs} fontWeight={s.td?800:700} fontFamily="Mulish,-apple-system,sans-serif" style={{pointerEvents:"none"}}>{s.day}</text>);})}
    <circle cx={GW.cx} cy={GW.cy} r={GW.rI} fill="white" filter="url(#cws)"/>
    <text x={GW.cx} y={GW.cy-32} textAnchor="middle" fontSize="22" style={{pointerEvents:"none"}}>{Ph.e}</text>
    <text x={GW.cx} y={GW.cy+8} textAnchor="middle" dominantBaseline="middle" fill={Ph.c} fontFamily="Fraunces,serif" fontSize="32" fontWeight="700" style={{pointerEvents:"none"}}>J{c.dayIn}</text>
    <text x={GW.cx} y={GW.cy+27} textAnchor="middle" dominantBaseline="middle" fill="#6E7A70" fontSize="10" fontWeight="800" style={{letterSpacing:".08em",pointerEvents:"none"}}>{Ph.l.toUpperCase()}</text>
    <text x={GW.cx} y={GW.cy+44} textAnchor="middle" dominantBaseline="middle" fill="#3C5B49" fontSize="10" fontWeight="700" style={{pointerEvents:"none"}}>{cycleLen}j · glisser le bord</text>
    <polygon points={mPts} fill="#1C2820" style={{pointerEvents:"none"}}/>
    <text x={f(ovPt.x)} y={f(ovPt.y)} textAnchor="middle" dominantBaseline="middle" fontSize="13" style={{pointerEvents:"none"}}>⭐</text>
  </svg>);
}

      <p style={{fontSize:11.5,color:"var(--mu)",textAlign:"center",marginTop:4}}>Courbes OMS indicatives (P3, médiane, P97). Partagez avec votre pédiatre.</p>
    </div>
    {milGroup&&<><div className="lbl"><Footprints size={14}/> Jalons vers {milGroup.m} mois</div>
    <div className="card">{milGroup.items.map(it=>(<div key={it} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
      <div className={`chk ${checks[it]?"on":""}`} onClick={()=>setChecks(c=>({...c,[it]:!c[it]}))}>
        {checks[it]&&<Check size={14} color="#fff"/>}
      </div>
      <div style={{fontSize:14.5,fontWeight:700,textDecoration:checks[it]?"line-through":"none",color:checks[it]?"var(--mu)":"var(--ink)"}}>{it}</div>
    </div>))}<p style={{fontSize:12,color:"var(--mu)",marginTop:4}}>Les jalons sont des moyennes — chaque bébé a son propre calendrier.</p></div></>}
    {upcoming&&<><div className="lbl"><Syringe size={14}/> Prochaine vaccination</div>
    <div className="card">
      <div style={{fontWeight:800,fontSize:15}}>{upcoming.label}</div>
      <div style={{fontSize:13,color:"var(--mu)",marginTop:4}}>{upcoming.sub}</div>
      <div style={{fontSize:12,color:"var(--sg)",marginTop:8,fontWeight:700}}>Calendrier vaccinal 2024 — à confirmer avec votre pédiatre.</div>
    </div></>}
    <div className="lbl"><BarChart3 size={14}/> Bilan</div>
    <RewindCards cards={rew}/>
    <div className="note" style={{marginTop:14}}><Info size={16} style={{flex:"none"}}/><span>Fièvre ≥ 38°C avant 3 mois → avis médical urgent. Refus de boire, teint gris, gêne respiratoire → 15.</span></div>
  </>);
}

/* ── Assistant IA ────────────────────────────────────────────── */
function AssistantIA({profile,c,g,pp,age}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Bonjour 🌿 Je suis l'assistant de Nid. Posez-moi une question sur votre parcours — je suis là pour informer, rassurer, orienter, sans jamais remplacer votre équipe médicale."}]);
  const [input,setInput]=useState("");const [loading,setLoading]=useState(false);
  const scr=useRef(null);
  useEffect(()=>{scr.current?.scrollTo(0,scr.current.scrollHeight);},[msgs,loading]);
  const SUGG={
    preconception:["Quand suis-je le plus fertile ?","Quels examens avant de concevoir ?","Comment optimiser mes chances naturellement ?"],
    grossesse:["Puis-je manger du fromage ?","Quels signes doivent m'alerter ?","Comment soulager les nausées ?"],
    postpartum:["Mes tranchées sont-elles normales ?","Comment savoir si bébé tète assez ?","Je me sens dépassée, que faire ?"],
    bebe:["Pourquoi mon bébé pleure le soir ?","Quand commencer la diversification ?","Comment instaurer une routine de sieste ?"],
  };
  const phCtx={
    preconception:c?`J${c.dayIn} du cycle · ${CPH[c.ph]?.l||c.ph} · ovulation estimée dans ${c.dToOv}j`:"",
    grossesse:g?`${g.sa} SA · T${g.tri} · ${g.wLeft} semaines avant terme`:"",
    postpartum:pp?pp.label:"",
    bebe:age?age.label:"",
  };
  const nameCtx=profile.name?", prénom "+profile.name:"";
  const phCtxStr=phCtx[profile.phase]?", données : "+phCtx[profile.phase]:"";
  const phLabel=PHASES[profile.phase]?.label||profile.phase;
  const sys="Tu es l'assistant de Nid, une application française d'accompagnement périnatal (préconception → 2 ans).\n"
    +"Contexte utilisateur : phase \""+phLabel+"\""+nameCtx+phCtxStr+".\n"
    +"Rôle : informer, rassurer, orienter — avec chaleur, sans jugement, en français.\n"
    +"Règles impératives :\n"
    +"- Ne jamais poser de diagnostic ni prescrire de traitement.\n"
    +"- Pour tout signe d'alerte (fièvre nourrisson, saignements, douleurs intenses, pensées sombres) : orienter vers un professionnel ; urgences : 15 (SAMU), 3114 (souffrance psychique).\n"
    +"- Réponses courtes (3-5 phrases), concrètes, chaleureuses.\n"
    +"- Indiquer que les informations s'appuient sur des repères de santé publique et doivent être validées par un professionnel.\n"
    +"- Aborder fausse couche et deuil périnatal avec une sensibilité particulière.";
  const send=useCallback(async(text)=>{
    const q=(text||input).trim();if(!q||loading)return;
    const next=[...msgs,{role:"user",content:q}];
    setMsgs(next);setInput("");setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:next.map(m=>({role:m.role,content:m.content}))})
      });
      const data=await res.json();
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("
").trim()||"Je n'ai pas pu répondre. Pour toute question de santé, contactez votre sage-femme ou votre médecin.";
      setMsgs(m=>[...m,{role:"assistant",content:txt}]);
    }catch(e){
      setMsgs(m=>[...m,{role:"assistant",content:"L'assistant n'est pas disponible. Pour toute question, n'hésitez pas à contacter votre sage-femme ou votre médecin."}]);
    }finally{setLoading(false);}
  },[input,loading,msgs,sys]);
  return(<div className="scr fade" key="ia" style={{display:"flex",flexDirection:"column",paddingBottom:100}}>
    <div className="top"><div><div className="eb">Nid · Assistant</div><h1 className="h1 sf">Posez votre question</h1></div></div>
    <div style={{display:"flex",gap:9,alignItems:"flex-start",background:"var(--cls)",border:"1px solid #E9C9BC",borderRadius:14,padding:"10px 12px",fontSize:12,color:"#7a3b27",lineHeight:1.4,marginBottom:14}}>
      <Shield size={15} style={{flex:"none",marginTop:1}}/><span>Informations bienveillantes et sourcées. Ne remplace pas un avis médical — consultez un professionnel pour tout doute.</span>
    </div>
    <div ref={scr} style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
      {msgs.map((m,i)=>(<div key={i} className={`bub ${m.role==="user"?"b-u":"b-a"}`}>{m.content}</div>))}
      {loading&&<div className="bub b-a typing" style={{display:"flex",gap:4,padding:"14px 16px"}}><i/><i/><i/></div>}
    </div>
    {msgs.length<=1&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
      {(SUGG[profile.phase]||[]).map(q=>(<div key={q} style={{background:"var(--sf)",border:"1px solid var(--ln)",borderRadius:999,padding:"9px 13px",fontSize:13,cursor:"pointer",fontWeight:600,color:"var(--sg)"}} onClick={()=>send(q)}>{q}</div>))}
    </div>}
    <div className="comp">
      <textarea rows={1} value={input} placeholder="Écrire un message…" onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
      <button className="sbtn" disabled={!input.trim()||loading} onClick={()=>send()}><Send size={18}/></button>
    </div>
  </div>);
}

/* ── Onboarding ──────────────────────────────────────────────── */
function Onboarding({profile,onDone,isFirst}){
  const [name,setName]=useState(profile.name||"");
  const [phase,setPhase]=useState(profile.phase||null);
  const [date,setDate]=useState("");
  const dLabel={grossesse:"Date du terme prévu (DPA)",bebe:"Date de naissance de bébé",postpartum:"Date de l'accouchement",preconception:"1ᵉʳ jour de vos dernières règles"}[phase]||"";
  return(<div className="scr fade" style={{paddingTop:0}}>
    <div style={{textAlign:"center",margin:"36px 0 10px"}}>
      <div style={{width:56,height:56,borderRadius:18,background:"var(--sg)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:14}}>
        <Leaf size={26} color="#fff"/>
      </div>
      <h1 className="h1 sf" style={{fontSize:28}}>{isFirst?"Bienvenue dans Nid":"Votre parcours"}</h1>
      <p style={{fontSize:14,color:"var(--mu)",lineHeight:1.55,margin:"8px 18px 0"}}>{isFirst?"Un accompagnement bienveillant, de la préconception aux 2 ans de bébé.":"Mettez à jour là où vous en êtes."}</p>
    </div>
    {isFirst&&<div style={{marginTop:18}}>
      <div className="lbl" style={{marginTop:6}}>Comment vous appeler ?</div>
      <input className="inp" placeholder="Prénom (facultatif)" value={name} onChange={e=>setName(e.target.value)}/>
    </div>}
    <div className="lbl">Où en êtes-vous ?</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {ORDER.map(p=>{const P=PHASES[p];const on=phase===p;return(<button key={p} onClick={()=>setPhase(p)} style={{background:on?"var(--sgs)":"var(--sf)",border:`${on?2:1}px solid ${on?"var(--sg)":"var(--ln)"}`,borderRadius:18,padding:16,cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:8}}>
        <P.Icon size={22} color={on?"var(--sg)":P.color}/>
        <div style={{fontWeight:800,fontSize:14.5,color:on?"var(--sg)":"var(--ink)"}}>{P.label}</div>
      </button>);})}
    </div>
    {phase&&dLabel&&<div style={{marginTop:6}}>
      <div className="lbl">{dLabel} <span style={{textTransform:"none",fontWeight:600,color:"var(--mu)"}}>(facultatif)</span></div>
      <input type="date" className="inp" value={date} onChange={e=>setDate(e.target.value)}/>
    </div>}
    <button className="btn btn-p" style={{marginTop:24}} disabled={!phase} onClick={()=>onDone({name:name.trim(),phase,dpa:phase==="grossesse"?date:profile.dpa,babyBirth:phase==="bebe"?date:profile.babyBirth,birthDate:phase==="postpartum"?date:profile.birthDate,lastPeriod:phase==="preconception"?date:profile.lastPeriod})}>
      {isFirst?"Commencer":"Mettre à jour"}
    </button>
    <div style={{display:"flex",gap:6,alignItems:"center",justifyContent:"center",marginTop:14,fontSize:11.5,color:"var(--mu)"}}>
      <Shield size={13}/> Vos données restent privées — jamais revendues.
    </div>
  </div>);
}

/* ── Profil ──────────────────────────────────────────────────── */
function Profil({profile,comfort,setComfort,goPhase,flash}){
  const P=PHASES[profile.phase]||PHASES.preconception;
  return(<div className="scr fade" key="profil">
    <div className="top"><div><div className="eb">Votre espace</div><h1 className="h1 sf">Profil</h1></div></div>
    <div className="card" style={{display:"flex",alignItems:"center",gap:14,marginBottom:10}}>
      <div style={{width:48,height:48,borderRadius:16,background:"var(--sgs)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Fraunces,serif",fontSize:20,fontWeight:700,color:"var(--sg)"}}>{(profile.name||"N")[0].toUpperCase()}</div>
      <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15.5}}>{profile.name||"Vous"}</div><div style={{fontSize:12.5,color:"var(--mu)"}}>{P.label}</div></div>
      <button className="btn btn-s" onClick={goPhase}>Modifier</button>
    </div>
    <div className="lbl"><Settings size={14}/> Réglages</div>
    <div className="card" style={{display:"flex",alignItems:"center",gap:14,padding:16}}>
      <div style={{width:40,height:40,borderRadius:12,background:"var(--cfs)",display:"flex",alignItems:"center",justifyContent:"center",flex:"none"}}><HandHeart size={18} color="var(--cf)"/></div>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:14.5}}>Mode réconfort</div>
        <div style={{fontSize:12,color:"var(--mu)",lineHeight:1.4}}>Met en pause les jalons et comparaisons, pour les moments difficiles ou un deuil.</div>
      </div>
      <div className={`tgl ${comfort?"on":""}`} onClick={()=>{setComfort(v=>!v);flash(comfort?"Mode réconfort désactivé":"Mode réconfort activé ♡");}}><b/></div>
    </div>
    <div className="lbl"><Shield size={14}/> Confidentialité</div>
    <div className="card">
      {[["Aucune revente de vos données","Données de santé jamais vendues ni utilisées pour de la publicité."],["Stockage local & privé","Vos données restent sur votre appareil."],["Votre droit à l'effacement","Vous pouvez tout supprimer à tout moment."]].map(([t,d],i)=>(<div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:i<2?14:0}}>
        <div style={{width:32,height:32,borderRadius:10,background:"var(--sgs)",display:"flex",alignItems:"center",justifyContent:"center",flex:"none"}}><Shield size={16} color="var(--sg)"/></div>
        <div><div style={{fontWeight:700,fontSize:14}}>{t}</div><div style={{fontSize:12.5,color:"var(--mu)",lineHeight:1.45}}>{d}</div></div>
      </div>))}
      <button className="btn btn-s" style={{marginTop:14,width:"100%"}} onClick={()=>flash("Export préparé (fonctionnalité à venir)")}>Exporter mes données</button>
    </div>
    <div style={{marginTop:28,borderTop:"1px solid var(--ln)",paddingTop:18,display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:28,height:28,borderRadius:9,background:"var(--sg)",display:"flex",alignItems:"center",justifyContent:"center"}}><Leaf size={14} color="#fff"/></div>
        <span style={{fontFamily:"Fraunces,serif",fontSize:16,fontWeight:700}}>Nid</span>
        <span style={{fontSize:12,fontWeight:800,color:"var(--mu)",letterSpacing:".04em"}}>v3.{BUILD.num}</span>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <div style={{background:"var(--sgs)",color:"var(--sg)",borderRadius:999,padding:"4px 10px",fontSize:11,fontWeight:800,letterSpacing:".06em"}}>{BUILD.sprint.toUpperCase()}</div>
        <div style={{background:"var(--hns)",color:"var(--hn2)",borderRadius:999,padding:"4px 10px",fontSize:11,fontWeight:800,fontFamily:"monospace"}}>{BUILD.sha}</div>
      </div>
      <div style={{fontSize:11.5,color:"var(--mu)",textAlign:"center",lineHeight:1.5,maxWidth:260}}>{BUILD.label}</div>
      <div style={{fontSize:11,color:"var(--mu)",opacity:.7}}>Dernière mise à jour : {BUILD.date}</div>
    </div>
  </div>);
}

/* ── Parcours ────────────────────────────────────────────────── */
function Parcours({profile,setProfile,flash}){
  return(<div className="scr fade" key="parcours">
    <div className="top"><div><div className="eb">Votre parcours</div><h1 className="h1 sf">Le Fil</h1></div></div>
    <div className="card" style={{marginTop:6}}>
      <Fil phase={profile.phase}/>
      <p style={{fontSize:13.5,lineHeight:1.6,color:"#34403a",marginTop:10}}>Votre parcours de la préconception aux 2 ans de bébé — chaque phase à son rythme, dans la continuité.</p>
    </div>
    <div className="lbl"><Map size={14}/> Phases</div>
    {ORDER.map(p=>{const P=PHASES[p];const cur=p===profile.phase;return(<div key={p} style={{display:"flex",alignItems:"center",gap:14,padding:15,background:"var(--sf)",border:`${cur?2:1}px solid ${cur?"var(--sg)":"var(--ln)"}`,borderRadius:18,marginBottom:10,cursor:"pointer"}} onClick={()=>{setProfile(pr=>({...pr,phase:p}));flash(`Phase : ${P.label}`);}}>
      <div style={{width:42,height:42,borderRadius:13,background:cur?"var(--sgs)":P.color+"22",display:"flex",alignItems:"center",justifyContent:"center",flex:"none"}}><P.Icon size={20} color={cur?"var(--sg)":P.color}/></div>
      <div style={{flex:1}}><div style={{fontWeight:800,fontSize:14.5,color:cur?"var(--sg)":"var(--ink)"}}>{P.label}</div></div>
      {cur&&<div className="badge" style={{background:"var(--sgs)",color:"var(--sg)"}}>Actif</div>}
    </div>);})}
  </div>);
}

/* ── APP principale ──────────────────────────────────────────── */
function App(){
  const [loaded,setLoaded]=useState(false);
  const [profile,setProfile]=useState({name:"",phase:null,cycleLen:28,periodLen:5,lastPeriod:"",dpa:"",babyBirth:"",birthDate:""});
  const [tab,setTab]=useState("home");
  const [sub,setSub]=useState(null); // "phase" | "onboarding"
  const [comfort,setComfort]=useState(false);
  const [logs,setLogs]=useState([]);
  const [phSheet,setPhSheet]=useState(null); // {ph, day}
  const [toastMsg,setToastMsg]=useState(null);
  const tmr=useRef(null);

  useEffect(()=>{(async()=>{
    const pr=await ld("nid_profile_v3",null);const lg=await ld("nid_logs_v3",[]);const cf=await ld("nid_comfort_v3",false);
    if(pr)setProfile(pr);setLogs(lg||[]);setComfort(!!cf);setLoaded(true);
  })();},[]);
  useEffect(()=>{if(loaded)sv("nid_profile_v3",profile);},[profile,loaded]);
  useEffect(()=>{if(loaded)sv("nid_logs_v3",logs);},[logs,loaded]);
  useEffect(()=>{if(loaded)sv("nid_comfort_v3",comfort);},[comfort,loaded]);

  const flash=useCallback((m)=>{setToastMsg(m);clearTimeout(tmr.current);tmr.current=setTimeout(()=>setToastMsg(null),1900);},[]);
  const addLog=useCallback((l)=>setLogs(prev=>[{...l,t:Date.now()},...prev]),[]);
  const onTap=useCallback((ph,day)=>setPhSheet({ph,day}),[]);
  const goPhase=()=>setSub("phase");

  const c=useMemo(()=>profile.phase==="preconception"?calcPreco({lastPeriod:profile.lastPeriod,cycleLen:profile.cycleLen||28,periodLen:profile.periodLen||5}):null,[profile]);
  const g=useMemo(()=>profile.phase==="grossesse"&&profile.dpa?calcGross(profile):null,[profile]);
  const pp=useMemo(()=>profile.phase==="postpartum"?ppInfo(profile.birthDate||isoOff(-30)):null,[profile]);
  const age=useMemo(()=>profile.phase==="bebe"?ageInfo(profile.babyBirth||isoOff(-120)):null,[profile]);

  if(!loaded)return(<><style>{CSS}</style><div className="stage nr"><div className="device"/></div></>);

  const onboarding=!profile.phase;
  const onDone=(p)=>{setProfile(pr=>({...pr,...p}));setSub(null);setTab("home");};
  const P=PHASES[profile.phase]||PHASES.preconception;

  const TABS=[["home","Accueil",Home],["ia","Assistant",MessageCircle],["parcours","Parcours",Map],["profil","Profil",Settings]];

  return(<>
    <style>{CSS}</style>
    <div className="stage nr">
      <div className={`device ${comfort?"cm":""}`}>
        {onboarding?(
          <Onboarding profile={profile} onDone={onDone} isFirst/>
        ):sub==="phase"?(
          <Onboarding profile={profile} onDone={onDone} isFirst={false}/>
        ):(
          <>
            {tab==="home"&&(<div className="scr fade" key={"home"+profile.phase}>
              <div className="top">
                <div><div className="eb">{P.label}</div><h1 className="h1 sf">{comfort?"On avance en douceur":"Votre nid, aujourd'hui"}</h1></div>
                <button className="chip" onClick={goPhase}><P.Icon size={14}/> {P.short}</button>
              </div>
              <div style={{marginBottom:6}}><Fil phase={profile.phase}/></div>
              {profile.phase==="preconception"&&<DashPreco profile={profile} setProfile={setProfile} onTap={onTap} flash={flash}/>}
              {profile.phase==="grossesse"&&<DashGross profile={profile} flash={flash}/>}
              {profile.phase==="postpartum"&&<DashPP profile={profile} comfort={comfort} flash={flash}/>}
              {profile.phase==="bebe"&&<DashBebe profile={profile} logs={logs} addLog={addLog} comfort={comfort} flash={flash}/>}
            </div>)}
            {tab==="ia"&&<AssistantIA profile={profile} c={c} g={g} pp={pp} age={age}/>}
            {tab==="parcours"&&<Parcours profile={profile} setProfile={setProfile} flash={flash}/>}
            {tab==="profil"&&<Profil profile={profile} comfort={comfort} setComfort={setComfort} goPhase={goPhase} flash={flash}/>}
            <div className="tbar">
              {TABS.map(([k,l,Ic])=>(<button key={k} className={`tab ${tab===k?"a":""}`} onClick={()=>setTab(k)}>
                <span className="dot"/><Ic size={21}/><span>{l}</span>
              </button>))}
            </div>
          </>
        )}
        {phSheet&&<PhaseSheet phId={phSheet.ph} day={phSheet.day} c={c} onClose={()=>setPhSheet(null)}/>}
        <div className="bstrip">
          <span className="bd">Données à jour au {BUILD.date}</span>
          <span className="bp">Build {BUILD.num}</span>
        </div>
        <div className={`toast ${toastMsg?"show":""}`}><Check size={15}/>{toastMsg}</div>
      </div>
    </div>
  </>);
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
