<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Nid</title>
<meta name="theme-color" content="#3C5B49"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#129530;</text></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#EBEEE5;-webkit-text-size-adjust:100%;overflow:hidden}
#root{height:100%}
#err{display:none;padding:40px 24px;font-family:system-ui;color:#243029;text-align:center}
</style>
</head>
<body>
<div id="root"></div>
<div id="err">Chargement impossible. <a href="javascript:location.reload()">Recharger</a></div>
<script>
window.addEventListener('error',function(e){
  var r=document.getElementById('root');
  if(r && r.innerHTML.length<50){document.getElementById('err').style.display='block';}
});
</script>
<script src="bundle.js"></script>
</body>
</html>
